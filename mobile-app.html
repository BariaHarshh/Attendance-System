<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Mobile App | Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        /* Mobile Phone Frame */
        .phone-frame {
            width: 375px;
            height: 700px;
            background: var(--bg);
            border: 8px solid #334155;
            border-radius: 3rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Notch */
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #334155;
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
            z-index: 10;
        }

        .app-content {
            flex: 1;
            padding: 2rem 1.5rem;
            overflow-y: auto;
        }

        .app-header {
            margin-top: 1rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .action-card {
            background: rgba(139, 92, 246, 0.1);
            border: 1px dashed var(--primary);
            padding: 1.5rem;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            margin-bottom: 1rem;
            outline: none;
        }

        button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.75rem;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .recent-title {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .attendance-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card);
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            margin-bottom: 0.75rem;
            animation: slideIn 0.3s ease-out;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .info {
            flex: 1;
        }

        .name {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .time {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-bar {
            height: 60px;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .nav-item {
            color: #94a3b8;
            font-size: 1.25rem;
        }

        .nav-item.active {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="app-content">
            <div class="app-header">
                <p style="font-size: 0.75rem; color: #94a3b8;">Welcome Back,</p>
                <h1>Teacher App 📱</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Total Present</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">100%</div>
                    <div class="stat-label">Sync Status</div>
                </div>
            </div>

            <div class="action-card">
                <input type="text" id="studentName" placeholder="Student Name...">
                <button id="markBtn">Mark Attendance</button>
            </div>

            <div class="recent-title">Recent Activity</div>
            <div id="activityList">
                <!-- Data will appear here -->
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">📊</div>
            <div class="nav-item">⚙️</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tmrsdvtdtbuqjhedtmqp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_304VG6Qmgh5cUvz3RTjSEg_DUSBVb3a';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const activityList = document.getElementById('activityList');
        const studentNameInput = document.getElementById('studentName');
        const markBtn = document.getElementById('markBtn');
        const totalCountDisplay = document.getElementById('totalCount');

        let totalPresent = 0;

        // Fetch initial data
        async function fetchAttendance() {
            const { data, error } = await supabaseClient
                .from('attendance')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(5);

            if (data) {
                activityList.innerHTML = '';
                data.forEach(item => addAttendanceToUI(item));
                updateTotalCount();
            }
        }

        async function updateTotalCount() {
            const { count, error } = await supabaseClient
                .from('attendance')
                .select('*', { count: 'exact', head: true });
            
            if (count !== null) {
                totalCountDisplay.innerText = count;
            }
        }

        function addAttendanceToUI(item) {
            const time = new Date(item.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const initial = item.student_name.charAt(0).toUpperCase();
            
            const div = document.createElement('div');
            div.className = 'attendance-item';
            div.innerHTML = `
                <div class="avatar">${initial}</div>
                <div class="info">
                    <div class="name">${item.student_name}</div>
                    <div class="time">${time}</div>
                </div>
                <div class="status-dot"></div>
            `;
            activityList.prepend(div);
        }

        // Real-time listener
        supabaseClient
            .channel('mobile-sync')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'attendance' }, payload => {
                addAttendanceToUI(payload.new);
                updateTotalCount();
            })
            .subscribe();

        // Mark Attendance
        markBtn.addEventListener('click', async () => {
            const name = studentNameInput.value.trim();
            if (!name) return;

            markBtn.innerText = 'Syncing...';
            const { error } = await supabaseClient
                .from('attendance')
                .insert([{ student_name: name, status: 'Present' }]);

            if (!error) {
                studentNameInput.value = '';
            }
            markBtn.innerText = 'Mark Attendance';
        });

        // Initialize
        fetchAttendance();
    </script>
</body>
</html>
